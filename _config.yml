title: The Token Guy
tagline: "IAM and Cloud Security — Microsoft Entra, Zero Trust, PowerShell & Graph"
description: "Field notes from an IAM and Cloud Security Practitioner. Lab work, certification study, and the occasional rabbit hole covering Microsoft Entra, Zero Trust, and beyond."
url: "https://thetokenguy.net"
baseurl: ""
lang: en-US
timezone: Asia/Kolkata

# Author settings
author:
  name: Pankaj Parmar
  url: https://www.linkedin.com/in/thetokenguy
avatar: /assets/img/avatar.jpg
theme: jekyll-theme-chirpy
theme_mode: dark
plugins:
  - jekyll-paginate
  - jekyll-sitemap
paginate: 10
paginate_path: "/page:num"
permalink: /posts/:title/

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      permalink: /posts/:title/
  - scope:
      path: ""
      type: tabs
    values:
      permalink: /:title/
