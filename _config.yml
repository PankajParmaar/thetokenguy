title: In Production
tagline: The working notes of an identity & infrastructure practitioner. Everything here ran somewhere real first.
url: "https://thetokenguy.net"
baseurl: ""
lang: en-US
timezone: Asia/Kolkata

# Author settings
author:
  name: Pankaj Parmar
  url: https://linkedin.com/in/thetokenguy
avatar: /assets/img/avatar.jpg
theme: jekyll-theme-chirpy
theme_mode: light
plugins:
  - jekyll-paginate
  - jekyll-sitemap
paginate: 10
paginate_path: "/page:num"
permalink: /posts/:title/

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      permalink: /posts/:title/
  - scope:
      path: ""
      type: tabs
    values:
      permalink: /:title/
